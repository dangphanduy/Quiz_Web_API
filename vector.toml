# Configuration for Vector log shipper

[sources.kafka_logs]
type = "kafka"
bootstrap_servers = "kafka:9092"
group_id = "vector-log-shipper"
topics = ["quiz-logs"]

[transforms.parse_json]
type = "remap"
inputs = ["kafka_logs"]
source = """
# Parse message as JSON if possible, otherwise keep it as raw text
parsed, err = parse_json(string!(.message))
if err != nil {
  .error = err
} else {
  # Merge parsed fields into root
  ., err = merge(., parsed)
  if err != nil {
    .error_merge = err
  }
  # Remove raw message to avoid duplication
  del(.message)
}
# Set timestamp from event if exists
if exists(.Timestamp) {
  .timestamp = parse_timestamp!(.Timestamp, format: "%Y-%m-%dT%H:%M:%S%.f%:z")
}
"""

[sinks.elasticsearch_logs]
type = "elasticsearch"
inputs = ["parse_json"]
endpoint = "http://elasticsearch:9200"
mode = "normal"
index = "quiz-logs-%Y.%m.%d"
compression = "none"
suppress_type_name = true
